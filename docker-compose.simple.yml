# 🚀 简化备用方案 - 最可靠版本！
# 使用这个如果主方案有问题
services:
  app:
    build:
      context: .
      target: dev
    container_name: task_tracker_dev
    ports:
      - "30001:30000"
    volumes:
      # 简化方案：不使用精细挂载，使用更简单的方式
      - ./:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - db_data:/data/db
    environment:
      - NODE_ENV=development
      - PORT=30000
      - DATABASE_URL=file:/data/db/dev.db
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  node_modules:
  next_cache:
  db_data:

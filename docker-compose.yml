services:
  app:
    build:
      context: .
      target: dev
    container_name: task_tracker_dev
    ports:
      - "30001:30000"
    volumes:
      # 整仓挂载，保证所有代码和配置都能实时生效
      - ./:/app
      # 使用命名卷隔离 Linux 依赖与构建缓存
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - db_data:/data/db
    environment:
      - NODE_ENV=development
      - PORT=30000
      - DATABASE_URL=file:/data/db/dev.db
      # Windows/WSL2 + Docker Desktop 下热更新更稳定
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

volumes:
  node_modules:
  next_cache:
  db_data:
